<div class="sidebar">
  <h3 style="color: mediumpurple;">Search Articles</h3>
  <input type="text" id="searchInput" placeholder="Search...">
  <ul id="searchResults"></ul>
</div>

<script src="/js/lunr.min.js"></script>
<script>
  // Simple Lunr.js search example
  const idx = lunr(function () {
    this.field('title')
    this.field('content')

    // Add pages manually (Hugo can generate this automatically)
    this.add({ id: 1, title: 'Welcome to Meisophant Tech Blog', content: 'Updates, tutorials, and insights about technology.' });
  });

  const searchInput = document.getElementById('searchInput');
  const resultsList = document.getElementById('searchResults');

  searchInput.addEventListener('input', () => {
    const query = searchInput.value;
    resultsList.innerHTML = '';
    if (!query) return;

    const results = idx.search(query);
    results.forEach(result => {
      const li = document.createElement('li');
      li.textContent = result.ref; // You can map ref to actual page URL
      resultsList.appendChild(li);
    });
  });
</script>
