{{ define "main" }}
<main class="blog-home">
  <h1 style="color: mediumpurple;">{{ .Title }}</h1>
  <p>{{ .Description }}</p>

  <div class="posts-list">
    {{ range .Pages }}
      <article class="post-item">
        <h2><a href="{{ .Permalink }}" style="color: mediumpurple;">{{ .Title }}</a></h2>
        <p>{{ .Summary }}</p>
        <a href="{{ .Permalink }}">Read More →</a>
      </article>
    {{ end }}
  </div>
</main>
{{ end }}
